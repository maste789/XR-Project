  <script>
    // Patch RTCPeerConnection to fix extmap ID collision on Android WebView.
    // mediasoup-client builds a synthetic answer SDP whose extmap IDs may differ
    // from the browser's offer IDs. This interceptor realigns the answer IDs to
    // match the offer so that setRemoteDescription never sees a reassignment.
    (function patchExtmapCollision() {
      var _offerExtmaps = new WeakMap();

      var _origSetLocal = RTCPeerConnection.prototype.setLocalDescription;
      RTCPeerConnection.prototype.setLocalDescription = function (desc) {
        if (desc && desc.type === 'offer' && desc.sdp) {
          var map = {};
          desc.sdp.replace(/\r\na=extmap:(\d+)(?:\/[^\s]+)?\s+([^\s\r\n]+)/g, function (_, id, uri) {
            map[uri] = id;
          });
          _offerExtmaps.set(this, map);
        }
        return _origSetLocal.apply(this, arguments);
      };

      var _origSetRemote = RTCPeerConnection.prototype.setRemoteDescription;
      RTCPeerConnection.prototype.setRemoteDescription = function (desc) {
        if (desc && desc.type === 'answer' && desc.sdp) {
          var map = _offerExtmaps.get(this);
          if (map) {
            var sdp = desc.sdp.replace(
              /(\r\na=extmap:)(\d+)((?:\/[^\s]+)?\s+)([^\s\r\n]+)/g,
              function (match, prefix, id, dir, uri) {
                return map[uri] !== undefined
                  ? prefix + map[uri] + dir + uri
                  : match;
              }
            );
            desc = new RTCSessionDescription({ type: 'answer', sdp: sdp });
          }
        }
        return _origSetRemote.apply(this, arguments);
      };
    })();
  </script>

  <script>
    (function bootstrapRoomCode() {
      const currentCode = sessionStorage.getItem("code");
      if (currentCode) return;

      const params = new URLSearchParams(window.location.search);
      let code = params.get("code") || params.get("room");

      // Android WebView bridge fallback.
      if (!code && window.Android && typeof window.Android.getCode === "function") {
        try {
          code = window.Android.getCode();
        } catch (e) {
          console.warn("Android.getCode() failed:", e);
        }
      }

      if (code) {
        sessionStorage.setItem("code", code);
        console.log("webview room code initialized:", code);
      } else {
        console.warn("room code is missing. pass ?code=... to webview url");
      }
    })();
  </script>

  <script>

    function fitWebviewLayout() {
      const maxW = window.innerWidth;
      const maxH = Math.min(window.innerHeight, 412);
      let height = maxH;
      let width = Math.floor((height / 3) * 4);

      if (width > maxW) {
        width = maxW;
        height = Math.floor((width / 4) * 3);
      }

      $(".videobox").css({
        margin: "auto",
        width: width + "px",
        height: height + "px",
      });

      if (typeof window.redrawCanvasForCurrentView === "function") {
        window.redrawCanvasForCurrentView();
      } else if (typeof lc !== "undefined" && lc && lc.respondToSizeChange) {
        lc.respondToSizeChange();
      }
    }

    fitWebviewLayout();
    $(window).on("resize", fitWebviewLayout);

    setTimeout(() => {
      fitWebviewLayout();
      if (typeof lc !== "undefined" && lc) {
        lc.on('drawEnd', function () {
          $(".lc-undo").trigger("click");
        });
      }
    }, 1500);

    // All scripts loaded — now convertStringToNumber is defined.
    // Kick off camera publish and subscribe explicitly.
    subscribe().catch((err) => console.error("auto subscribe ERROR:", err));

    // Publish chain: getDevicesId → startMedia → publish (inside startMedia .then).
    // Call startMedia here as an extra safety net.
    startMedia();

  </script>
