  <body>
    mediasoup v3 subscribe with socket.io<br />
    <button id="subscribe_button" onclick="subscribe();">Subscribe</button>
    <button id="disconnect_button" onclick="disconnect();">Disconnect</button>
    <div>
      <span id="state_span"></span>
    </div>
    remote video<br />
    <div id="remote_container"></div>

    <div>
      local video<br />
      <video
        id="local_video"
        autoplay
        style="width: 240px; height: 180px; border: 1px solid black"
      ></video>
      <span id="state_span2"></span>
      <span>camera : </span>
      <select id="camera_list" onchange="onChangeCamera()"></select>
      <span>audio : </span>
      <select id="audio_list" onchange="onChangeCamera()"></select>
      <br />
      <input type="checkbox" id="use_video" checked="1">video</input>
      <input type="checkbox" id="use_audio" checked="1">audio</input>
      <select id="sharing_type">
        <option>camera</option>
        <option>screen</option>
      </select>
      <button id="start_video_button" onclick="startMedia();">
        Start Media
      </button>
      <button id="stop_video_button" onclick="stopMedia();">Stop Media</button>
      &nbsp;
      <button id="publish_button" onclick="publish();">publish</button>
      <button id="disconnect_button" onclick="disconnect2();">Disconnect</button>
    </div>
  </body>
  <script>
    const remoteContainer = document.getElementById("remote_container");
    const stateSpan = document.getElementById("state_span");
    let localStream = null;
    let clientId = null;
    let device = null;
    let consumerTransport = null;
    let videoConsumer = null;
    let audioConsumer = null;

    let statsInterval = null;
    let fps = 0;
    let traffic = 0;
    let totalProcessingDelay = 0;

    // ---- TODO ----
    //  DONE - (check can consumer for subcribe) --> subscribe before publish
    //  DONE - audio track
    //  - multiple rooms

    // =========== socket.io ==========
    let socket = null;

    let keepAliveInterval = null;

    // return Promise
    function connectSocket() {
      if (socket) {
        socket.close();
        socket = null;
        clientId = null;
      }

      clearInterval(keepAliveInterval);

      return new Promise((resolve, reject) => {
        socket = io("https://xr.k-bridge.co.kr", {
          withCredentials: true,
          transports: ["websocket"],
          upgrade: false,
        }); //io.connect("/");

        socket.on("connect", function (evt) {
          console.log("socket.io connected()");
        });
        socket.on("error", function (err) {
          console.error("socket.io ERROR:", err);
          reject(err);
        });
        socket.on("disconnect", function (evt) {
          console.log("socket.io disconnect:", evt);
        });
        socket.on("message", function (message) {
          console.log("socket.io message:", message);
          if (message.type === "welcome") {
            if (socket.id !== message.id) {
              console.warn(
                "WARN: something wrong with clientID",
                socket.io,
                message.id
              );
            }

            clientId = message.id;
            console.log("connected to server. clientId=" + clientId);
            resolve();
          } else {
            console.error("UNKNOWN message from server:", message);
          }
        });
        socket.on("newProducer", async function (message) {
          console.log("socket.io newProducer:", message);
          if (consumerTransport) {
            // start consume
            if (message.kind === "video") {
              videoConsumer = await consumeAndResume(
                consumerTransport,
                message.kind
              );
            } else if (message.kind === "audio") {
              audioConsumer = await consumeAndResume(
                consumerTransport,
                message.kind
              );
            }
          }
        });

        socket.on("producerClosed", function (message) {
          console.log("socket.io producerClosed:", message);
          const localId = message.localId;
          const remoteId = message.remoteId;
          const kind = message.kind;
          console.log(
            "--try removeConsumer remoteId=" +
              remoteId +
              ", localId=" +
              localId +
              ", kind=" +
              kind
          );
          if (kind === "video") {
            if (videoConsumer) {
              videoConsumer.close();
              videoConsumer = null;
            }
          } else if (kind === "audio") {
            if (audioConsumer) {
              audioConsumer.close();
              audioConsumer = null;
            }
          }

          if (remoteId) {
            removeRemoteVideo(remoteId);
          } else {
            removeAllRemoteVideo();
          }
        });

        socket.on("publisherReady", function (data) {
          if (!document.getElementsByTagName("video")[0] && data.room === 1) {
            subscribe();
          }
        });

        if (socket) {
          keepAliveInterval = setInterval(function () {
            socket.emit("aliveChecker", {});
          }, 3000);
        }
      });
    }

    function disconnectSocket() {
      if (socket) {
        socket.close();
        socket = null;
        clientId = null;
        console.log("socket.io closed..");
      }
    }

    function isSocketConnected() {
      if (socket) {
        return true;
      } else {
        return false;
      }
    }

    function sendRequest(type, data) {
      return new Promise((resolve, reject) => {
        socket.emit(type, data, (err, response) => {
          if (!err) {
            // Success response, so pass the mediasoup response to the local Room.
            resolve(response);
          } else {
            reject(err);
          }
        });
      });
    }

    // =========== media handling ==========
    /*
  function stopLocalStream(stream) {
    let tracks = stream.getTracks();
    if (!tracks) {
      console.warn('NO tracks');
      return;
    }
    tracks.forEach(track => track.stop());
  }
  */

    // return Promise
    function playVideo(element, stream) {
      if (element.srcObject) {
        console.warn("element ALREADY playing, so ignore");
        return;
      }
      element.srcObject = stream;
      element.volume = 0;
      return element.play();
    }

    function pauseVideo(element) {
      element.pause();
      element.srcObject = null;
    }

    function addRemoteTrack(id, track) {
      let video = findRemoteVideo(id);
      if (!video) {
        video = addRemoteVideo(id);
      }

      if (video.srcObject) {
        video.srcObject.addTrack(track);
        return;
      }

      const newStream = new MediaStream();
      newStream.addTrack(track);
      playVideo(video, newStream)
        .then(() => {
          video.volume = 1.0;
        })
        .catch((err) => {
          console.error("media ERROR:", err);
        });
    }

    function addRemoteVideo(id) {
      let existElement = findRemoteVideo(id);
      if (existElement) {
        console.warn("remoteVideo element ALREADY exist for id=" + id);
        return existElement;
      }

      let element = document.createElement("video");
      remoteContainer.appendChild(element);
      element.id = "remote_" + id;
      element.width = 480;
      element.height = 360;
      element.volume = 0;
      //element.controls = true;
      element.style = "border: solid black 1px;";
      return element;
    }

    function findRemoteVideo(id) {
      let element = document.getElementById("remote_" + id);
      return element;
    }

    function removeRemoteVideo(id) {
      console.log(" ---- removeRemoteVideo() id=" + id);
      let element = document.getElementById("remote_" + id);
      if (element) {
        element.pause();
        element.srcObject = null;
        remoteContainer.removeChild(element);
      } else {
        console.log("child element NOT FOUND");
      }
    }

    function removeAllRemoteVideo() {
      while (remoteContainer.firstChild) {
        remoteContainer.firstChild.pause();
        remoteContainer.firstChild.srcObject = null;
        remoteContainer.removeChild(remoteContainer.firstChild);
      }
    }

    // ============ UI button ==========

    async function subscribe() {
      if (!isSocketConnected()) {
        console.log("ssss");
        await connectSocket().catch((err) => {
          console.error(err);
          return;
        });

        // --- get capabilities --
        const data = await sendRequest("getRouterRtpCapabilities", {});
        console.log("getRouterRtpCapabilities:", data);
        await loadDevice(data);
      }

      updateButtons();

      // --- prepare transport ---
      console.log("--- createConsumerTransport --");
      const params = await sendRequest("createConsumerTransport", {});
      console.log("transport params:", params);
      consumerTransport = device.createRecvTransport(params);
      console.log("createConsumerTransport:", consumerTransport);

      // --- NG ---
      //sendRequest('connectConsumerTransport', { dtlsParameters: dtlsParameters })
      //  .then(callback)
      //  .catch(errback);

      // --- try --- not well
      //sendRequest('connectConsumerTransport', { dtlsParameters: params.dtlsParameters })
      //  .then(() => console.log('connectConsumerTransport OK'))
      //  .catch(err => console.error('connectConsumerTransport ERROR:', err));

      // --- join & start publish --
      consumerTransport.on(
        "connect",
        async ({ dtlsParameters }, callback, errback) => {
          console.log("--consumer trasnport connect");
          sendRequest("connectConsumerTransport", {
            dtlsParameters: dtlsParameters,
          })
            .then(callback)
            .catch(errback);

          //consumer = await consumeAndResume(consumerTransport);
        }
      );

      consumerTransport.on("connectionstatechange", (state) => {
        switch (state) {
          case "connecting":
            console.log("subscribing...");
            break;

          case "connected":
            console.log("subscribed");
            break;

          case "failed":
            console.log("failed");
            console.log("plz");
            reconnect();

            producerTransport.close();
            break;

          default:
            break;
        }
      });

      // Get subscription stats every 2 seconds
      startGetStatsPer2Sec(consumerTransport);

      videoConsumer = await consumeAndResume(consumerTransport, "video");
      audioConsumer = await consumeAndResume(consumerTransport, "audio");

      updateButtons();
    }

    async function consumeAndResume(transport, kind) {
      const consumer = await consume(consumerTransport, kind);
      if (consumer) {
        console.log("-- track exist, consumer ready. kind=" + kind);
        updateButtons();
        if (kind === "video") {
          console.log("-- resume kind=" + kind);
          sendRequest("resume", { kind: kind })
            .then(() => {
              console.log("resume OK");
              return consumer;
            })
            .catch((err) => {
              console.error("resume ERROR:", err);
              return consumer;
            });
        } else {
          console.log("-- do not resume kind=" + kind);
        }
      } else {
        console.log("-- no consumer yet. kind=" + kind);
        return null;
      }
    }

    function disconnect() {
      if (videoConsumer) {
        videoConsumer.close();
        videoConsumer = null;
      }
      if (audioConsumer) {
        audioConsumer.close();
        audioConsumer = null;
      }
      if (consumerTransport) {
        consumerTransport.close();
        consumerTransport = null;
      }
      stopGetStatsPer2Sec();

      removeAllRemoteVideo();

      disconnectSocket();
      updateButtons();
    }

    async function loadDevice(routerRtpCapabilities) {
      try {
        device = new MediasoupClient.Device();
      } catch (error) {
        if (error.name === "UnsupportedError") {
          console.error("browser not supported");
        }
      }
      await device.load({ routerRtpCapabilities });
    }

    async function consume(transport, trackKind) {
      console.log("--start of consume --kind=" + trackKind);
      const { rtpCapabilities } = device;
      //const data = await socket.request('consume', { rtpCapabilities });
      const data = await sendRequest("consume", {
        rtpCapabilities: rtpCapabilities,
        kind: trackKind,
      }).catch((err) => {
        console.error("consume ERROR:", err);
      });
      const { producerId, id, kind, rtpParameters } = data;
      console.log(data);
      if (producerId) {
        let codecOptions = {};
        const consumer = await transport.consume({
          id,
          producerId,
          kind,
          rtpParameters,
          codecOptions,
        });
        //const stream = new MediaStream();
        //stream.addTrack(consumer.track);

        // Get subscription stats every 2 seconds
        // setInterval(async () => {
        //   const stats = await consumer.getStats();
        //   // console.log(stats); //.get("inbound-rtp")
        //   const inboundRtpStats = stats.filter((stats) => {
        //     console.log(stats.type, stats.trackId);
        //     return (
        //       stats.type === "inbound-rtp" &&
        //       stats.trackId === consumer.track.id
        //     );
        //   });
        //   if (inboundRtpStats) {
        //     console.log(`FPS: ${inboundRtpStats.framesPerSecond}`);
        //     console.log(`Traffic: ${inboundRtpStats.bytesReceived}`);
        //   }
        //   s;
        // }, 2000);

        addRemoteTrack(clientId, consumer.track);

        console.log("--end of consume");
        //return stream;

        return consumer;
      } else {
        console.warn("--- remote producer NOT READY");

        return null;
      }
    }

    // ---- UI control ----
    function updateButtons() {
      if (isSocketConnected()) {
        enabelElement("disconnect_button");
      } else {
        disableElement("disconnect_button");
      }

      if (consumerTransport) {
        disableElement("subscribe_button");
      } else {
        enabelElement("subscribe_button");
      }
    }

    function enabelElement(id) {
      let element = document.getElementById(id);
      if (element) {
        element.removeAttribute("disabled");
      }
    }

    function disableElement(id) {
      let element = document.getElementById(id);
      if (element) {
        element.setAttribute("disabled", "1");
      }
    }

    // start get status of webrtc
    function startGetStatsPer2Sec(transport) {
      statsInterval = setInterval(async () => {
        transport.getStats(null).then((stats) => {
          stats.forEach((report) => {
            if (
              report.type === "inbound-rtp" &&
              report.kind === "video" &&
              report.framesPerSecond
            ) {
              let prevTraffic = traffic;
              fps = report.framesPerSecond;
              traffic = report.bytesReceived;
              totalProcessingDelay = report.totalProcessingDelay;
              console.log(`FPS: ${fps}`);
              console.log(`PrevTraffic: ${prevTraffic}`);
              console.log(`Traffic: ${traffic}`);
              console.log(`totalProcessingDelay: ${totalProcessingDelay}ms`);
            }
          });
        });
      }, 2000);
    }

    // stop get status of webrtc
    function stopGetStatsPer2Sec() {
      clearInterval(statsInterval);
      fps = 0;
      traffic = 0;
      totalProcessingDelay = 0;
    }

    function reconnect() {
      console.log("try reconnect");
      disconnect();
      connectSocket();
      // subscribe();
    }

    updateButtons();
    console.log("=== ready ===");
  </script>

  <script>
    const localVideo = document.getElementById("local_video");
    const _stateSpan = document.getElementById("state_span2");
    let _localStream = null;
    let _clientId = null;
    let _device = null;
    let producerTransport = null;
    let videoProducer = null;
    let audioProducer = null;

    // =========== socket.io ==========
    let _socket = null;

    let _keepAliveInterval = null;

    // return Promise
    function connectSocket() {
      if (_socket) {
        _socket.close();
        _socket = null;
        _clientId = null;
      }

      clearInterval(_keepAliveInterval);

      return new Promise((resolve, reject) => {
        _socket = io("https://xr.k-bridge.co.kr", {
          withCredentials: true,
          transports: ["websocket"],
          upgrade: false,
        }); //io.connect('/');

        _socket.on("connect", function (evt) {
          console.log("_socket.io connected()");
        });
        _socket.on("error", function (err) {
          console.error("_socket.io ERROR:", err);
          reject(err);
        });
        _socket.on("disconnect", function (evt) {
          console.log("_socket.io disconnect:", evt);
        });
        _socket.on("message", function (message) {
          console.log("_socket.io message:", message);
          if (message.type === "welcome") {
            if (_socket.id !== message.id) {
              console.warn(
                "WARN: something wrong with clientID",
                _socket.io,
                message.id
              );
            }

            _clientId = message.id;
            console.log("connected to server. _clientId=" + _clientId);
            resolve();
          } else {
            console.error("UNKNOWN message from server:", message);
          }
        });
        _socket.on("newProducer", async function (message) {
          console.warn("IGNORE _socket.io newProducer:", message);
        });

        _keepAliveInterval = setInterval(function () {
          console.log("hi");
          _socket.emit("readyToConnect", { room: 1 });
          _socket.emit("aliveChecker", {});
        }, 3000);
      });
    }

    function disconnectSocket() {
      if (_socket) {
        _socket.close();
        _socket = null;
        _clientId = null;
        console.log("_socket.io closed..");
      }
    }

    function isSocketConnected() {
      if (_socket) {
        return true;
      } else {
        return false;
      }
    }

    function sendRequest(type, data) {
      return new Promise((resolve, reject) => {
        _socket.emit(type, data, (err, response) => {
          if (!err) {
            // Success response, so pass the mediasoup response to the local Room.
            resolve(response);
          } else {
            reject(err);
          }
        });
      });
    }

    // =========== media handling ==========
    function stopLocalStream(stream) {
      let tracks = stream.getTracks();
      if (!tracks) {
        console.warn("NO tracks");
        return;
      }

      tracks.forEach((track) => track.stop());
    }

    // return Promise
    function playVideo(element, stream) {
      if (element.srcObject) {
        console.warn("element ALREADY playing, so ignore");
        return;
      }
      element.srcObject = stream;
      element.volume = 0;
      return element.play();
    }

    function pauseVideo(element) {
      element.pause();
      element.srcObject = null;
    }

    // ============ UI button ==========

    function checkUseVideo() {
      const useVideo = document.getElementById("use_video").checked;
      return useVideo;
    }

    function checkUseAudio() {
      const useAudio = document.getElementById("use_audio").checked;
      return useAudio;
    }

    function getDevicesId() {
      if (!navigator.mediaDevices?.enumerateDevices) {
        console.log("enumerateDevices() not supported.");
      } else {
        // List cameras and microphones.
        navigator.mediaDevices
          .enumerateDevices()
          .then((devices) => {
            devices.forEach((_device) => {
              console.log(
                `${_device.kind}: ${_device.label} id = ${_device.deviceId}`
              );
              if (_device.kind === "videoinput") {
                const option = document.createElement("option");
                option.text = _device.label;
                option.value = _device.deviceId;

                const cameraList = document.getElementById("camera_list");
                cameraList.appendChild(option);
              } else if (_device.kind === "audioinput") {
                const option = document.createElement("option");
                option.text = _device.label;
                option.value = _device.deviceId;

                const audioList = document.getElementById("audio_list");
                audioList.appendChild(option);
              }
            });
          })
          .catch((err) => {
            console.error(`${err.name}: ${err.message}`);
          });
      }
    }

    function startMedia() {
      if (_localStream) {
        console.warn("WARN: local media ALREADY started");
        return;
      }

      const useVideo = checkUseVideo();
      const useAudio = checkUseAudio();

      const sharingType = document.getElementById("sharing_type").value;

      // if(isVideoSwitch){
      //   useVideo = {
      //     deviceId: videoId
      //   }
      // }

      if (sharingType === "camera") {
        navigator.mediaDevices
          .getUserMedia({ audio: useAudio, video: useVideo })
          .then((stream) => {
            _localStream = stream;
            playVideo(localVideo, _localStream);
            updateButtons();
          })
          .catch((err) => {
            console.error("media ERROR:", err);
          });
      } else if (sharingType === "screen") {
        navigator.mediaDevices
          .getDisplayMedia({ audio: useAudio, video: useVideo })
          .then((stream) => {
            _localStream = stream;
            playVideo(localVideo, _localStream);
            updateButtons();
          })
          .catch((err) => {
            console.error("media ERROR:", err);
          });
      }
    }

    function stopMedia() {
      if (_localStream) {
        pauseVideo(localVideo);
        stopLocalStream(_localStream);
        _localStream = null;
      }
      updateButtons();
    }

    async function publish() {
      if (!_localStream) {
        console.warn("WARN: local media NOT READY");
        return;
      }

      // --- connect _socket.io ---
      if (!isSocketConnected()) {
        await connectSocket().catch((err) => {
          console.error(err);
          return;
        });

        // --- get capabilities --
        const data = await sendRequest("getRouterRtpCapabilities", {});
        console.log("getRouterRtpCapabilities:", data);
        await loadDevice(data);
      }

      updateButtons();

      // --- get transport info ---
      console.log("--- createProducerTransport --");
      const params = await sendRequest("createProducerTransport", {});
      console.log("transport params:", params);
      producerTransport = _device.createSendTransport(params);
      console.log("createSendTransport:", producerTransport);

      // --- join & start publish --
      producerTransport.on(
        "connect",
        async ({ dtlsParameters }, callback, errback) => {
          console.log("--trasnport connect");
          sendRequest("connectProducerTransport", {
            dtlsParameters: dtlsParameters,
          })
            .then(callback)
            .catch(errback);
        }
      );

      producerTransport.on(
        "produce",
        async ({ kind, rtpParameters }, callback, errback) => {
          console.log("--trasnport produce");
          try {
            const { id } = await sendRequest("produce", {
              transportId: producerTransport.id,
              kind,
              rtpParameters,
            });
            callback({ id });
          } catch (err) {
            errback(err);
          }
        }
      );

      producerTransport.on("connectionstatechange", (state) => {
        switch (state) {
          case "connecting":
            console.log("publishing...");
            break;

          case "connected":
            console.log("published");
            break;

          case "failed":
            console.log("failed");
            producerTransport.close();
            reconnect();
            break;

          default:
            break;
        }
      });

      const useVideo = checkUseVideo();
      const useAudio = checkUseAudio();
      if (useVideo) {
        const videoTrack = _localStream.getVideoTracks()[0];
        console.log(_localStream.getVideoTracks().length);
        if (videoTrack) {
          const trackParams = { track: videoTrack };
          console.log(trackParams.track.readyState);
          videoProducer = await producerTransport.produce(trackParams);
        }
      }
      if (useAudio) {
        const audioTrack = _localStream.getAudioTracks()[0];
        if (audioTrack) {
          const trackParams = { track: audioTrack };
          audioProducer = await producerTransport.produce(trackParams);
        }
      }

      updateButtons();
    }

    function disconnect2() {
      if (_localStream) {
        pauseVideo(localVideo);
        stopLocalStream(_localStream);
        _localStream = null;
      }
      if (videoProducer) {
        videoProducer.close(); // _localStream will stop
        videoProducer = null;
      }
      if (audioProducer) {
        audioProducer.close(); // _localStream will stop
        audioProducer = null;
      }
      if (producerTransport) {
        producerTransport.close(); // _localStream will stop
        producerTransport = null;
      }

      disconnectSocket();
      updateButtons();
    }

    async function loadDevice(routerRtpCapabilities) {
      try {
        _device = new MediasoupClient.Device();
      } catch (error) {
        if (error.name === "UnsupportedError") {
          console.error("browser not supported");
        }
      }
      await _device.load({ routerRtpCapabilities });
    }

    // ---- UI control ----
    function updateButtons() {
      if (_localStream) {
        disableElement("start_video_button");
        disableElement("use_video");
        disableElement("use_audio");
        if (isSocketConnected()) {
          disableElement("stop_video_button");
        } else {
          enabelElement("stop_video_button");
        }

        if (videoProducer || audioProducer) {
          disableElement("publish_button");
        } else {
          enabelElement("publish_button");
        }
      } else {
        enabelElement("start_video_button");
        enabelElement("use_video");
        enabelElement("use_audio");
        disableElement("stop_video_button");
        disableElement("publish_button");
      }

      if (isSocketConnected()) {
        enabelElement("disconnect_button");
      } else {
        disableElement("disconnect_button");
      }
    }

    function enabelElement(id) {
      let element = document.getElementById(id);
      if (element) {
        element.removeAttribute("disabled");
      }
    }

    function disableElement(id) {
      let element = document.getElementById(id);
      if (element) {
        element.setAttribute("disabled", "1");
      }
    }

    async function republish() {
      // --- connect _socket.io ---
      // if (!isSocketConnected()) {
      await connectSocket().catch((err) => {
        console.error(err);
        return;
      });

      // --- get capabilities --
      const data = await sendRequest("getRouterRtpCapabilities", {});
      console.log("getRouterRtpCapabilities:", data);
      await loadDevice(data);
      // }

      updateButtons();

      // --- get transport info ---
      console.log("--- createProducerTransport --");
      const params = await sendRequest("createProducerTransport", {});
      console.log("transport params:", params);
      producerTransport = _device.createSendTransport(params);
      console.log("createSendTransport:", producerTransport);

      // --- join & start publish --
      producerTransport.on(
        "connect",
        async ({ dtlsParameters }, callback, errback) => {
          console.log("--trasnport connect");
          sendRequest("connectProducerTransport", {
            dtlsParameters: dtlsParameters,
          })
            .then(callback)
            .catch(errback);
        }
      );

      producerTransport.on(
        "produce",
        async ({ kind, rtpParameters }, callback, errback) => {
          console.log("--trasnport produce");
          try {
            const { id } = await sendRequest("produce", {
              transportId: producerTransport.id,
              kind,
              rtpParameters,
            });
            callback({ id });
          } catch (err) {
            errback(err);
          }
        }
      );

      producerTransport.on("connectionstatechange", (state) => {
        switch (state) {
          case "connecting":
            console.log("publishing...");
            break;

          case "connected":
            console.log("published");
            _socket.emit("refresh");
            break;

          case "failed":
            console.log("failed");
            producerTransport.close();
            console.log("----no----");
            reconnect();
            break;

          default:
            break;
        }
      });

      const useVideo = checkUseVideo();
      const useAudio = checkUseAudio();
      if (useVideo) {
        const videoTrack = _localStream.getVideoTracks()[0];
        console.log(_localStream.getVideoTracks().length);
        if (videoTrack) {
          const trackParams = { track: videoTrack };

          console.log(trackParams.track.readyState);
          videoProducer = await producerTransport.produce(trackParams);
        }
      }
      if (useAudio) {
        const audioTrack = _localStream.getAudioTracks()[0];
        if (audioTrack) {
          const trackParams = { track: audioTrack };
          audioProducer = await producerTransport.produce(trackParams);
        }
      }
      // _socket.emit('refresh')
    }

    function onChangeCamera() {
      const nextDeviceId = document.getElementById("camera_list").value;
      if (_localStream) {
        pauseVideo(localVideo);
        stopLocalStream(_localStream);
        _localStream = null;
      }
      console.log(nextDeviceId);
      // startMedia(true, nextDeviceId);
      navigator.mediaDevices
        .getUserMedia({ video: { deviceId: { exact: nextDeviceId } } })
        .then((stream) => {
          disconnect2();
          // replace the video stream in the video element
          _localStream = stream;
          playVideo(localVideo, _localStream);
          // updateButtons();

          publish();
          // republish();
        })
        .catch((error) => {
          console.error("Failed to get user media:", error);
        });
    }

    function reconnect() {
      // disconnect2();
      // // setTimeout(()=>{}, )
      // startMedia()
      // publish()
      stopMedia();
      startMedia();
      const checkMediaRunning = setInterval(() => {
        if (_localStream) {
          republish();
          clearInterval(checkMediaRunning);
        }
      }, 500);
    }

    updateButtons();
    getDevicesId();
    console.log("=== ready ===");
  </script>
