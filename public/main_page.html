    <script>
    (function patchExtmapCollision() {
      var _offerExtmaps = new WeakMap();

      var _origSetLocal = RTCPeerConnection.prototype.setLocalDescription;
      RTCPeerConnection.prototype.setLocalDescription = function (desc) {
        if (desc && desc.type === 'offer' && desc.sdp) {
          var map = {};
          desc.sdp.replace(/\r\na=extmap:(\d+)(?:\/[^\s]+)?\s+([^\s\r\n]+)/g, function (_, id, uri) {
            map[uri] = id;
          });
          _offerExtmaps.set(this, map);
        }
        return _origSetLocal.apply(this, arguments);
      };

      var _origSetRemote = RTCPeerConnection.prototype.setRemoteDescription;
      RTCPeerConnection.prototype.setRemoteDescription = function (desc) {
        if (desc && desc.type === 'answer' && desc.sdp) {
          var map = _offerExtmaps.get(this);
          if (map) {
            var sdp = desc.sdp.replace(
              /(\r\na=extmap:)(\d+)((?:\/[^\s]+)?\s+)([^\s\r\n]+)/g,
              function (match, prefix, id, dir, uri) {
                return map[uri] !== undefined
                  ? prefix + map[uri] + dir + uri
                  : match;
              }
            );
            desc = new RTCSessionDescription({ type: 'answer', sdp: sdp });
          }
        }
        return _origSetRemote.apply(this, arguments);
      };
    })();
  </script>
